spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.url=jdbc:sqlite::memory:
spring.datasource.username=
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=create-drop

spring.security.oauth2.client.registration.google.client-id=tt
spring.security.oauth2.client.registration.google.client-secret=tt

app.jwt.secret=t
app.cors.allowed-origins=http://localhost:4200

spring.security.oauth2.client.registration.github.client-id=tt
spring.security.oauth2.client.registration.github.client-secret=tt

spring.security.oauth2.client.registration.microsoft.client-id=tt
spring.security.oauth2.client.registration.microsoft.client-secret=tt

spring.security.oauth2.client.registration.google.scope=openid, profile, email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/auth/google/callback

spring.security.oauth2.client.registration.github.scope=openid, profile, email
spring.security.oauth2.client.registration.github.redirect-uri={baseUrl}/auth/github/callback

spring.security.oauth2.client.registration.microsoft.scope=openid, profile, email
spring.security.oauth2.client.registration.microsoft.redirect-uri={baseUrl}/auth/microsoft/callback
spring.security.oauth2.client.registration.microsoft.provider=microsoft
spring.security.oauth2.client.registration.microsoft.authorization-grant-type=authorization_code

spring.security.oauth2.client.provider.microsoft.authorization-uri=https://login.microsoftonline.com/common/oauth2/v2.0/authorize
spring.security.oauth2.client.provider.microsoft.token-uri=https://login.microsoftonline.com/common/oauth2/v2.0/token
spring.security.oauth2.client.provider.microsoft.user-info-uri=https://graph.microsoft.com/oidc/userinfo
spring.security.oauth2.client.provider.microsoft.user-name-attribute=name

app.jwt.expiration-ms=3600000
app.jwt.remember-me-expiration-ms=2592000000
