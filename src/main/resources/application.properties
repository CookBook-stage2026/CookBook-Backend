spring.application.name=backend

spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=VARCHAR

spring.security.oauth2.client.registration.google.client-id={GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret={GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid, profile, email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/auth/google/callback

spring.security.oauth2.client.registration.github.client-id={GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret={GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=openid, profile, email
spring.security.oauth2.client.registration.github.redirect-uri={baseUrl}/auth/github/callback

app.jwt.secret={JWT_SECRET}
app.jwt.expiration-ms=86400000
app.cors.allowed-origins={ALLOWED_ORIGINS}