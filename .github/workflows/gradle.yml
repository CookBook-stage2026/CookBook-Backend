name: Java CI with Gradle

on:
  push:
    branches: [ "main", "development" ]
  pull_request:
    branches: [ "main", "development" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

    - name: Change wrapper permissions
      run: chmod +x ./gradlew

    - name: Run checkstyle with Gradle
      run: ./gradlew checkstyleMain checkstyleTest --no-daemon

    - name: Run with coverage
      run: ./gradlew build jacocoTestReport jacocoTestCoverageVerification --no-daemon -x checkstyleMain -x checkstyleTest

    - name: Upload JaCoCo XML report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-xml-report
        path: build/reports/jacoco/test/jacocoTestReport.xml

    - name: Analyze with SonarQube
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: ./gradlew sonar --info --no-daemon


  docker:

    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development'))
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/cookbook-backend" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest