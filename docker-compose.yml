name: cookbook

services:
  backend:
    image: cookbook-backend
    ports:
      - "8080:8080"
    environment:
      - DB_USERNAME=username
      - DB_PASSWORD=password
      - SPRING_PROFILES_ACTIVE=deploy
    volumes:
      - db-data:/app/data
    profiles: [ "deploy" ]

  frontend:
    image: cookbook-frontend
    ports:
      - "80:8081"
    depends_on:
      - backend
    profiles: [ "deploy" ]

  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:11434/api/tags" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    profiles: [ "dev" ]

volumes:
  db-data:
  ollama-data: